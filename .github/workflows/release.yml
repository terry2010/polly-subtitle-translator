# AI-SubTrans 双平台云端发布工作流
#
# 触发方式：
#   1. push tag v* → 自动构建 Win + Mac 并发布
#   2. GitHub Actions 页面手动触发（输入版本号 + 更新内容）
#
# 前提（在仓库 Settings → Secrets 中配置）：
#   TAURI_SIGNING_PRIVATE_KEY          → 私钥文件内容（cat ~/.tauri/ai-subtrans.key）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD → 私钥密码
#   GITHUB_TOKEN                       → Actions 自动提供，无需手动配置
#
# 用法：
#   git tag v1.0.1
#   git push origin v1.0.1
#   → 自动触发，约 20-30 分钟后 Release + latest.json 自动更新

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.1，不含 v 前缀）'
        required: true
      notes:
        description: '更新内容（多行用换行）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # 准备阶段：从 tag 或手动输入提取版本号和更新内容
  # ──────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      notes: ${{ steps.meta.outputs.notes }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            NOTES="Release v${VERSION}"
          else
            VERSION="${{ inputs.version }}"
            NOTES="${{ inputs.notes }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<${EOF}" >> "$GITHUB_OUTPUT"
          echo "${NOTES}" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # 构建阶段：Windows + macOS 并行构建
  # ──────────────────────────────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis
          - os: macos-latest
            bundles: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci
      # npm optional dependencies bug 修复：tailwindcss/oxide native binding
      - run: npm i @tailwindcss/oxide --force || true

      - name: Set version
        run: node scripts/publish.mjs --set-version "${{ needs.prepare.outputs.version }}"

      - name: Build with signing
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build -- --bundles ${{ matrix.bundles }}

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.notes }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  # ──────────────────────────────────────────────
  # 清单更新阶段：合并双平台签名，生成 latest.json
  # ──────────────────────────────────────────────
  update-manifest:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Update latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish.mjs --update-latest "${{ needs.prepare.outputs.version }}" "${{ needs.prepare.outputs.notes }}"
