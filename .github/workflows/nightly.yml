# AI-SubTrans Nightly 构建工作流
#
# 触发方式：仅手动触发（GitHub Actions 页面 或 gh workflow run）
#
# 版本号：自动从 Cargo.toml 读取基础版本 + 时间戳
#   例：1.0.1-nightly.20260706.143025
#
# Release 类型：prerelease，保留最近 5 个
# 清单文件：nightly.json（gh-pages 分支）
#
# 前提（在仓库 Settings → Secrets 中配置）：
#   TAURI_SIGNING_PRIVATE_KEY          → 私钥文件内容
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD → 私钥密码
#   GITHUB_TOKEN                       → Actions 自动提供
#
# 用法：
#   gh workflow run nightly.yml
#   gh workflow run nightly.yml -f notes="修复字幕样式问题"

name: Nightly

on:
  workflow_dispatch:
    inputs:
      notes:
        description: '更新内容（可选，默认自动生成）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # 准备阶段：生成 nightly 版本号
  # ──────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      version-split: ${{ steps.meta.outputs.version-split }}
      notes: ${{ steps.meta.outputs.notes }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        shell: bash
        run: |
          # 从 Cargo.toml 读取基础版本号
          BASE_VERSION=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # 生成时间戳 YYYYMMDD.HHMMSS（UTC）
          TIMESTAMP=$(date -u +"%Y%m%d.%H%M%S")
          VERSION="${BASE_VERSION}-nightly.${TIMESTAMP}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version-split=${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "生成 nightly 版本号: ${VERSION}"
          echo "tag: nightly-${TIMESTAMP}"

          # 更新内容
          NOTES="${{ inputs.notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Nightly build $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<${EOF}" >> "$GITHUB_OUTPUT"
          echo "${NOTES}" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # 构建阶段：Windows + macOS 并行构建
  # ──────────────────────────────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis
          - os: macos-latest
            bundles: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Set version
        run: node scripts/publish.mjs --set-version "${{ needs.prepare.outputs.version }}"

      - name: Build with signing
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build -- --bundles ${{ matrix.bundles }}

      - name: Upload artifacts to prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ needs.prepare.outputs.version-split }}
          name: nightly-${{ needs.prepare.outputs.version-split }}
          body: ${{ needs.prepare.outputs.notes }}
          prerelease: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  # ──────────────────────────────────────────────
  # 清单更新阶段：合并双平台签名，生成 nightly.json
  # ──────────────────────────────────────────────
  update-manifest:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Update nightly.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish.mjs --update-latest --nightly "${{ needs.prepare.outputs.version }}" "${{ needs.prepare.outputs.notes }}"

  # ──────────────────────────────────────────────
  # 清理阶段：保留最近 5 个 nightly Release
  # ──────────────────────────────────────────────
  cleanup:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Delete old nightly releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 列出所有 nightly- 开头的 release，按时间降序，保留前 5 个
          gh release list --limit 100 --json tagName,createdAt --jq '.[] | select(.tagName | startswith("nightly-"))' | \
            sort -r | tail -n +6 | while read tag; do
              echo "删除旧 nightly release: $tag"
              gh release delete "$tag" --yes --cleanup-tag
            done
