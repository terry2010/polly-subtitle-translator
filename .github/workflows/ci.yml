name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo check --lib
      - run: cargo clippy --lib
      - run: cargo test --lib
